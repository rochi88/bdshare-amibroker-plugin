name: Build & Release DLL

on:
  release:
    types: [published]   # triggers when a GitHub Release is published

permissions:
  contents: write        # needed to upload release assets

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: windows-latest
    strategy:
      matrix:
        include:
          - arch: x86
            cmake_arch: Win32
            artifact: BDShare_DSE_x86.dll
          - arch: x64
            cmake_arch: x64
            artifact: BDShare_DSE_x64.dll

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── MSVC toolchain ────────────────────────────────────────────────────
      - name: Set up MSVC
        uses: microsoft/setup-msbuild@v2

      # ── CMake configure ───────────────────────────────────────────────────
      - name: Configure CMake (${{ matrix.arch }})
        run: |
          cmake -B build/${{ matrix.arch }} `
                -A ${{ matrix.cmake_arch }} `
                -DCMAKE_BUILD_TYPE=Release

      # ── Build ─────────────────────────────────────────────────────────────
      - name: Build (${{ matrix.arch }})
        run: |
          cmake --build build/${{ matrix.arch }} `
                --config Release `
                --parallel

      # ── Rename DLL to include arch suffix ────────────────────────────────
      - name: Rename output DLL
        run: |
          Copy-Item `
            build/${{ matrix.arch }}/Release/BDShare_DSE.dll `
            ${{ matrix.artifact }}

      # ── Upload DLL as release asset ───────────────────────────────────────
      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}

  # --------------------------------------------------------------------------
  # Optional: attach the AFL script to the release as well
  # --------------------------------------------------------------------------
  attach-afl:
    name: Attach AFL script
    runs-on: ubuntu-latest
    needs: build          # run after both DLL builds succeed

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Upload AFL formula
        uses: softprops/action-gh-release@v2
        with:
          files: scripts/BDShare_DSE_Dashboard.afl